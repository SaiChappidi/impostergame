<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#12081c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Imposter</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-root" id="appRoot">
      <div class="app-chrome">
        <header class="app-header" id="globalHeader">
          <div class="header-play" id="headerPlayMode">
            <div class="app-header-inner">
              <span class="app-icon" aria-hidden="true">?</span>
              <div class="app-header-text">
                <h1 class="app-title">Imposter</h1>
                <p class="app-subtitle" id="headerSubtitle">Pass &amp; play</p>
              </div>
            </div>
          </div>
          <div class="header-setup hidden" id="headerSetupMode">
            <button type="button" class="icon-btn icon-btn--ghost" id="setupBack" aria-label="Back">
              ‹
            </button>
            <h1 class="settings-header-title" id="setupTitle">Game Settings</h1>
            <button type="button" class="icon-btn" id="setupGear" aria-label="Word and question packs">⚙</button>
          </div>
        </header>

        <div class="app-scroll" id="appScroll">
          <main class="app-main" id="main"></main>
        </div>

        <nav class="tab-bar" id="tabBar">
          <button type="button" class="tab-bar-btn is-active" data-tab="play" aria-current="page">
            <span class="tab-bar-icon" aria-hidden="true">▶</span>
            <span>Play</span>
          </button>
          <button type="button" class="tab-bar-btn" data-tab="packs">
            <span class="tab-bar-icon" aria-hidden="true">≡</span>
            <span>Packs</span>
          </button>
        </nav>
      </div>
    </div>
    <script src="words.js"></script>
    <script src="questions.js"></script>
    <script src="game.js"></script>
  </body>
</html>
